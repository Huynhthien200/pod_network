<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pod Social | Blockchain & Walrus Storage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.13.1/ethers.umd.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root {
            --pod-green: #10b981;
            --pod-deep: #010a05;
            --bg-image: url('https://raw.githubusercontent.com/Huynhthien200/anh_profile/7768fc1e3bf6024128f9290b00f354ce8655d8a4/1500x500.png');
        }

        body {
            background-color: var(--pod-deep);
            background-image: linear-gradient(rgba(1, 10, 5, 0.8), rgba(1, 10, 5, 0.95)), var(--bg-image);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #cbd5e1;
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
        }

        .glass-panel {
            background: rgba(5, 15, 10, 0.7);
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(16, 185, 129, 0.1);
        }

        .btn-primary {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        }

        #editor:empty:before { content: attr(data-placeholder); color: #475569; }
        
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(16, 185, 129, 0.3); border-radius: 10px; }
    </style>
</head>
<body class="selection:bg-emerald-500/30 custom-scrollbar">

    <div id="toast-container" class="fixed bottom-6 right-6 z-[200] flex flex-col gap-3 pointer-events-none"></div>

    <!-- Status Header -->
    <div class="sticky top-0 z-[100] bg-[#010a05]/90 backdrop-blur-md border-b border-white/5 py-2 px-6">
        <div class="flex justify-between items-center max-w-6xl mx-auto">
            <div class="flex items-center gap-4">
                <span class="text-[10px] font-black text-emerald-400 uppercase tracking-tighter">Pod Network V2</span>
                <div id="network-status" class="flex items-center gap-2 text-[9px] font-bold text-slate-500">
                    <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></span> RPC CONNECTED
                </div>
            </div>
            <div class="text-[9px] font-mono text-slate-500 italic hidden md:block">
                Storage: Walrus Testnet (Aggregator Active)
            </div>
        </div>
    </div>

    <div class="max-w-6xl mx-auto px-4 py-8">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- Left Sidebar -->
            <aside class="lg:col-span-3 space-y-6">
                <div class="flex items-center gap-3 mb-8 cursor-pointer" onclick="location.reload()">
                    <div class="w-10 h-10 bg-emerald-500 rounded-xl flex items-center justify-center text-black shadow-lg">
                        <i data-lucide="zap"></i>
                    </div>
                    <h1 class="text-2xl font-black text-white italic">Pod<span class="text-emerald-400">Social</span></h1>
                </div>

                <div id="auth-section" class="space-y-3">
                    <button id="btn-connect-wallet" onclick="window.connectWallet()" class="w-full btn-primary flex items-center justify-center gap-3 px-6 py-4 rounded-2xl text-xs font-black text-slate-950 shadow-xl">
                        <i data-lucide="wallet" class="w-4 h-4"></i> KẾT NỐI VÍ
                    </button>
                    <div id="user-info" class="hidden glass-panel p-5 rounded-3xl border-emerald-500/20 space-y-4 fade-in">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 bg-slate-900 rounded-full flex items-center justify-center text-emerald-400 border border-white/5">
                                <i data-lucide="user"></i>
                            </div>
                            <div class="min-w-0">
                                <p id="acc-display" class="text-white font-bold text-xs truncate"></p>
                                <p id="bal-display" class="text-[9px] text-emerald-500 font-bold">0.00 pETH</p>
                            </div>
                        </div>
                        <button onclick="location.reload()" class="w-full py-2 rounded-xl bg-white/5 text-[9px] font-bold text-red-400 uppercase">Đăng xuất</button>
                    </div>
                </div>

                <nav class="space-y-1">
                    <button onclick="window.switchView('global')" id="nav-global" class="w-full flex items-center gap-4 px-6 py-4 rounded-2xl text-xs font-black transition-all text-emerald-400 bg-white/5">
                        <i data-lucide="globe" class="w-4 h-4"></i> TOÀN CẦU
                    </button>
                    <button onclick="window.switchView('personal')" id="nav-personal" class="w-full flex items-center gap-4 px-6 py-4 rounded-2xl text-xs font-black transition-all text-slate-500 hover:bg-white/5">
                        <i data-lucide="user" class="w-4 h-4"></i> CỦA TÔI
                    </button>
                </nav>
            </aside>

            <!-- Main Feed -->
            <main class="lg:col-span-6 space-y-6">
                <!-- Composer -->
                <div id="composer" class="hidden glass-panel p-6 rounded-[2.5rem] border-white/5 mb-8 fade-in">
                    <div class="flex gap-4">
                        <div class="w-12 h-12 bg-emerald-500/10 rounded-full flex-shrink-0 flex items-center justify-center text-emerald-400">
                            <i data-lucide="pen-tool"></i>
                        </div>
                        <div class="flex-grow space-y-4">
                            <div id="editor" contenteditable="true" class="w-full bg-transparent text-white text-lg focus:outline-none min-h-[60px]" data-placeholder="Bạn muốn chia sẻ gì lên Blockchain?"></div>
                            <div class="flex items-center justify-between pt-4 border-t border-white/5">
                                <button onclick="document.getElementById('file-input').click()" class="p-2.5 rounded-full hover:bg-emerald-500/10 text-emerald-400 transition-colors">
                                    <i data-lucide="image" class="w-5 h-5"></i>
                                    <input type="file" id="file-input" class="hidden" accept="image/*" onchange="window.handleUpload(this)">
                                </button>
                                <button id="btn-post" onclick="window.postToBlockchain()" class="btn-primary px-8 py-2.5 rounded-full text-xs font-black text-slate-950 uppercase">
                                    ĐĂNG BÀI
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Feed Title & Sync -->
                <div class="flex items-center justify-between px-2">
                    <h2 class="text-xs font-black text-white uppercase tracking-widest flex items-center gap-2 italic">
                        <i data-lucide="layers" class="w-4 h-4 text-emerald-500"></i> Dòng thời gian
                    </h2>
                    <div id="sync-indicator" class="text-[9px] font-bold text-slate-600 flex items-center gap-2">
                        <i data-lucide="refresh-cw" class="w-3 h-3 animate-spin"></i> ĐANG QUÉT CHUỖI...
                    </div>
                </div>

                <!-- Posts List -->
                <div id="posts-list" class="space-y-4 pb-20">
                    <!-- Posts load here -->
                </div>
            </main>

            <!-- Right Sidebar -->
            <aside class="lg:col-span-3 space-y-6 hidden lg:block">
                <div class="glass-panel p-6 rounded-3xl border-white/5">
                    <h3 class="text-white font-bold text-[10px] uppercase mb-4 tracking-widest text-emerald-400">Thông tin chuỗi</h3>
                    <div class="space-y-4">
                        <div>
                            <p class="text-[8px] text-slate-500 font-bold uppercase">Hợp đồng Indexer</p>
                            <p class="text-[10px] font-mono text-slate-300 truncate">0xd7094f9db021c676075d2bfc4188c57bc9bd2afa</p>
                        </div>
                        <div>
                            <p class="text-[8px] text-slate-500 font-bold uppercase">Nguồn lưu trữ</p>
                            <p class="text-[10px] text-slate-300">Walrus Protocol (Decentralized)</p>
                        </div>
                        <div id="onchain-badge" class="hidden py-2 px-3 bg-emerald-500/10 border border-emerald-500/20 rounded-xl text-[9px] text-emerald-400 font-bold text-center italic">
                             KẾT NỐI DỮ LIỆU THẬT THÀNH CÔNG
                        </div>
                    </div>
                </div>
            </aside>
        </div>
    </div>

    <script>
        const CONFIG = {
            RPC: 'https://rpc.v2.pod.network',
            INDEXER: '0xd7094f9db021c676075d2bfc4188c57bc9bd2afa',
            WALRUS_PUB: 'https://publisher.walrus-testnet.walrus.space',
            WALRUS_AGG: 'https://aggregator.walrus-testnet.walrus.space',
            TOPIC: ethers.id("PostCreated(address,string,uint256)")
        };

        let currentAccount = null;
        let viewMode = 'global';

        // --- CORE BLOCKCHAIN LOGIC ---

        window.connectWallet = async () => {
            if (!window.ethereum) { showToast('Cần MetaMask!', 'error'); return; }
            try {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                currentAccount = accounts[0];
                setupUserUI();
                showToast('Đã kết nối Blockchain', 'success');
            } catch (e) { showToast('Lỗi kết nối', 'error'); }
        };

        async function setupUserUI() {
            document.getElementById('btn-connect-wallet').classList.add('hidden');
            document.getElementById('user-info').classList.remove('hidden');
            document.getElementById('composer').classList.remove('hidden');
            document.getElementById('acc-display').innerText = currentAccount;
            updateBalance();
        }

        async function updateBalance() {
            try {
                const provider = new ethers.JsonRpcProvider(CONFIG.RPC);
                const bal = await provider.getBalance(currentAccount);
                document.getElementById('bal-display').innerText = `${parseFloat(ethers.formatEther(bal)).toFixed(4)} pETH`;
            } catch (e) {}
        }

        window.syncData = async () => {
            const indicator = document.getElementById('sync-indicator');
            indicator.innerHTML = `<i data-lucide="refresh-cw" class="w-3 h-3 animate-spin"></i> ĐANG QUÉT CHUỖI...`;
            lucide.createIcons();

            try {
                const provider = new ethers.JsonRpcProvider(CONFIG.RPC);
                const latestBlock = await provider.getBlockNumber();
                
                // TĂNG PHẠM VI QUÉT LÊN 100,000 BLOCK
                const logs = await provider.getLogs({
                    address: CONFIG.INDEXER,
                    fromBlock: Math.max(0, latestBlock - 100000),
                    toBlock: 'latest',
                    topics: [CONFIG.TOPIC]
                });

                const iface = new ethers.Interface(["event PostCreated(address indexed author, string blobId, uint256 week)"]);
                
                const posts = await Promise.all(logs.map(async (log) => {
                    try {
                        const parsed = iface.parseLog(log);
                        const blobId = parsed.args.blobId;
                        
                        const response = await fetch(`${CONFIG.WALRUS_AGG}/v1/blobs/${blobId}`);
                        if (!response.ok) return null;
                        const data = await response.json();
                        
                        return {
                            ...data,
                            author: parsed.args.author,
                            tx: log.transactionHash,
                            isReal: true
                        };
                    } catch (e) { return null; }
                }));

                const validPosts = posts.filter(p => p !== null).sort((a,b) => (b.ts || 0) - (a.ts || 0));

                if (validPosts.length > 0) {
                    renderPosts(validPosts);
                    document.getElementById('onchain-badge').classList.remove('hidden');
                    indicator.innerHTML = `<i data-lucide="check" class="w-3 h-3 text-emerald-500"></i> TÌM THẤY ${validPosts.length} BÀI ĐĂNG`;
                } else {
                    renderMockPosts();
                    indicator.innerHTML = `<span class="text-orange-400">HIỂN THỊ DỮ LIỆU GỢI Ý</span>`;
                }
                lucide.createIcons();
            } catch (err) {
                console.error("Sync Error:", err);
                renderMockPosts();
                indicator.innerHTML = `<span class="text-red-400">RPC BUSY - LOAD DATA GỢI Ý</span>`;
            }
        };

        function renderPosts(data) {
            const container = document.getElementById('posts-list');
            container.innerHTML = '';
            
            data.forEach(post => {
                const card = document.createElement('div');
                card.className = 'glass-panel p-6 rounded-[2rem] border-white/5 fade-in';
                
                let mediaHtml = '';
                if (post.blobs && post.blobs.length > 0) {
                    const url = post.blobs[0].blobId === 'mock-img' ? post.blobs[0].url : `${CONFIG.WALRUS_AGG}/v1/blobs/${post.blobs[0].blobId}`;
                    mediaHtml = `<div class="mt-4 rounded-2xl overflow-hidden border border-white/10"><img src="${url}" class="w-full max-h-96 object-cover" onerror="this.src='https://placehold.co/600x400/010a05/10b981?text=Walrus+Syncing...'"></div>`;
                }

                card.innerHTML = `
                    <div class="flex gap-4">
                        <div class="w-10 h-10 bg-slate-900 rounded-full flex-shrink-0 flex items-center justify-center text-emerald-400 border border-white/5">
                            <i data-lucide="user"></i>
                        </div>
                        <div class="flex-grow min-w-0">
                            <div class="flex items-center gap-2 mb-1">
                                <span class="text-xs font-bold text-white truncate">${post.author.slice(0,12)}${post.author.length > 12 ? '...' : ''}</span>
                                <span class="text-[9px] text-slate-600 font-bold">• ${post.date || 'On-chain'}</span>
                            </div>
                            <div class="text-[14px] text-slate-300 leading-relaxed">${post.content}</div>
                            ${mediaHtml}
                            <div class="flex items-center justify-between mt-4 pt-3 border-t border-white/5">
                                <div class="flex gap-6">
                                    <i data-lucide="heart" class="w-4 h-4 text-slate-600 hover:text-emerald-500 cursor-pointer"></i>
                                    <i data-lucide="message-circle" class="w-4 h-4 text-slate-600 hover:text-emerald-500 cursor-pointer"></i>
                                    <i data-lucide="share-2" class="w-4 h-4 text-slate-600 hover:text-emerald-500 cursor-pointer"></i>
                                </div>
                                <span class="text-[8px] font-mono text-slate-700">TX: ${post.tx.slice(0,14)}...</span>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
            lucide.createIcons();
        }

        // --- BỔ SUNG NHIỀU DỮ LIỆU MẪU HƠN ---
        function renderMockPosts() {
            const mock = [
                {
                    author: "Pod_Network_Admin",
                    content: "Chào mừng bạn quay trở lại! Nếu bạn không thấy các bài đăng cũ, có thể do chúng nằm ngoài phạm vi 100.000 block vừa quét. Hãy thử đăng bài mới để kiểm tra kết nối chuỗi nhé!",
                    date: "Hôm nay",
                    tx: "0x0000000000000000000000",
                    blobs: [{ blobId: 'mock-img', url: 'https://images.unsplash.com/photo-1639762681485-074b7f938ba0?q=80&w=1000&auto=format' }]
                },
                {
                    author: "Walrus_Protocol_Alpha",
                    content: "Hệ thống lưu trữ phi tập trung Walrus đang hoạt động ổn định. Mọi dữ liệu media của bạn được phân mảnh và lưu trữ an toàn trên các node.",
                    date: "Vừa xong",
                    tx: "0x1111111111111111111111",
                    blobs: []
                },
                {
                    author: "Degen_User_99",
                    content: "LFG! Pod Social is the future of Web3 Social. No censorship, just pure blockchain magic. 🚀💎",
                    date: "1 giờ trước",
                    tx: "0x2222222222222222222222",
                    blobs: []
                }
            ];
            renderPosts(mock);
        }

        window.postToBlockchain = async () => {
            const editor = document.getElementById('editor');
            const content = editor.innerHTML;
            if (!content.trim() || content === '<br>') return;

            const btn = document.getElementById('btn-post');
            btn.disabled = true;
            btn.innerHTML = 'ĐANG TẢI...';

            try {
                const metadata = {
                    content,
                    ts: Date.now(),
                    date: new Date().toLocaleDateString('vi-VN'),
                    blobs: []
                };

                const res = await fetch(`${CONFIG.WALRUS_PUB}/v1/blobs?epochs=5`, {
                    method: 'PUT',
                    body: JSON.stringify(metadata)
                });
                const resData = await res.json();
                const blobId = resData.newlyCreated ? resData.newlyCreated.blobObject.blobId : resData.alreadyCertified.blobId;

                const provider = new ethers.BrowserProvider(window.ethereum);
                const signer = await provider.getSigner();
                const contract = new ethers.Contract(CONFIG.INDEXER, ["function createPost(string blobId, uint256 week) public"], signer);
                
                const tx = await contract.createPost(blobId, 0);
                showToast("Đang gửi giao dịch...");
                await tx.wait();
                
                showToast("Đã neo bài viết vào Blockchain!", "success");
                editor.innerHTML = '';
                window.syncData();
            } catch (e) {
                console.error(e);
                showToast("Lỗi: Kiểm tra pETH hoặc kết nối!", "error");
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'ĐĂNG BÀI';
            }
        };

        function showToast(msg, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `glass-panel px-6 py-4 rounded-2xl text-[10px] font-black shadow-2xl border-emerald-500/20 fade-in ${type === 'error' ? 'text-red-400' : 'text-emerald-400'}`;
            toast.innerHTML = msg.toUpperCase();
            document.getElementById('toast-container').appendChild(toast);
            setTimeout(() => {
                toast.classList.add('opacity-0');
                setTimeout(() => toast.remove(), 500);
            }, 4000);
        }

        window.onload = () => {
            lucide.createIcons();
            window.syncData();
            setInterval(window.syncData, 60000); 
        };
    </script>
</body>
</html>
